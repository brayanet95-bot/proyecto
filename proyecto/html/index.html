<script>
let index = 0;
const imgs = document.querySelectorAll(".carrusel img");

function cambiar(){
    imgs.forEach(i => i.style.display = "none");
    index++;
    if(index > imgs.length) index = 1;
    imgs[index-1].style.display = "block";
}

setInterval(cambiar, 2000);
</script>
